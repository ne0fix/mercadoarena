services:
  db:
    image: postgres:16-alpine
    container_name: arenabeach_db
    environment:
      POSTGRES_DB: arenabeach
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arenadev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d arenabeach"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
